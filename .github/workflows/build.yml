name: Build New Release

on:
  release:
    types: [published]

permissions:
  contents: write

defaults:
  run:
    shell: bash

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  ASSET_NAME: Session_Sniffer.exe

jobs:
  build:
    runs-on: windows-latest
    name: Build Windows x64
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout release source
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.14'
          architecture: x64
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Bake build metadata
        env:
          COMMIT_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_DATE: ${{ github.event.release.published_at }}
        run: |
          $ErrorActionPreference = 'Stop'
          $env:COMMIT_DATE = (git show -s --format=%cI $env:COMMIT_SHA).Trim()

          python -c @'
          import os
          import platform
          import tomllib
          from pathlib import Path

          pyproject_data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          dependencies = pyproject_data['project']['dependencies']

          pyqt_version = '-'
          for dependency in dependencies:
              name, _, version = dependency.partition('==')
              if name.strip().lower() == 'pyqt6' and version:
                  pyqt_version = version.split(';', 1)[0].strip()
                  break

          machine = platform.machine()
          arch = 'x64' if machine in ('AMD64', 'x86_64') else machine
          os_info = f'{os.environ.get("OS", platform.system())} {arch} {platform.version()}'

          path = Path('src/session_sniffer/constants/_build_info.py')
          path.write_text(
              '"""Build-time metadata frozen by the CI workflow."""\n'
              f'RELEASE_TAG: str = {os.environ["RELEASE_TAG"]!r}\n'
              f'RELEASE_DATE: str = {os.environ["RELEASE_DATE"]!r}\n'
              f'COMMIT_SHA: str = {os.environ["COMMIT_SHA"]!r}\n'
              f'COMMIT_DATE: str = {os.environ["COMMIT_DATE"]!r}\n'
              f'PYQT_VERSION: str = {pyqt_version!r}\n'
              f'OS_INFO: str = {os_info!r}\n',
              encoding='utf-8',
          )
          '@

          Get-Content 'src/session_sniffer/constants/_build_info.py'

      - name: Verify baked build metadata
        run: |
          $ErrorActionPreference = 'Stop'
          $content = Get-Content 'src/session_sniffer/constants/_build_info.py' -Raw

          foreach ($bad in @('import ', 'subprocess', '_git', 'Unknown')) {
            if ($content -match [regex]::Escape($bad)) {
              throw "Build metadata still contains development/runtime value: $bad"
            }
          }

          foreach ($required in @('RELEASE_TAG', 'RELEASE_DATE', 'COMMIT_SHA', 'COMMIT_DATE', 'PYQT_VERSION', 'OS_INFO')) {
            if ($content -notmatch "$required`: str =") {
              throw "Build metadata is missing $required."
            }
          }

          python -m py_compile 'src/session_sniffer/constants/_build_info.py'

      - name: Create virtual environment
        working-directory: .github/workflows
        run: python -m venv --upgrade-deps '.venv'

      - name: Install build dependencies
        working-directory: .github/workflows
        run: |
          .venv\Scripts\python -m pip install '..\..'
          .venv\Scripts\python -m pip install pyinstaller

      - name: Build executable with PyInstaller
        working-directory: .github/workflows
        run: .venv\Scripts\pyinstaller 'Session_Sniffer.spec'

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ env.ASSET_NAME }}
          path: .github/workflows/dist/${{ env.ASSET_NAME }}
          if-no-files-found: error

  upload-release-artifact:
    needs: [build]
    runs-on: ubuntu-24.04
    name: Upload release artifact
    outputs:
      sha256: ${{ steps.release_asset.outputs.sha256 }}
      download_url: ${{ steps.release_asset.outputs.download_url }}
    steps:
      - name: Download workflow artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ env.ASSET_NAME }}
          path: artifacts

      - name: Upload asset and compute release info
        id: release_asset
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          exe_path="artifacts/$ASSET_NAME"
          if [[ ! -f "$exe_path" ]]; then
            echo "Expected release asset is missing: $exe_path"
            exit 1
          fi

          sha256=$(sha256sum "$exe_path" | cut -d ' ' -f 1)
          if [[ -z "$sha256" ]]; then
            echo "Failed to calculate SHA-256 for $exe_path." >&2
            exit 1
          fi

          gh release upload "$RELEASE_TAG" "$exe_path" --repo "$GH_REPO" --clobber
          download_url=$(gh api "repos/$GH_REPO/releases/tags/$RELEASE_TAG" \
            --jq ".assets | map(select(.name == \"$ASSET_NAME\")) | if length == 1 then .[0].browser_download_url else empty end")

          if [[ -z "$download_url" ]]; then
            echo "Failed to resolve unique $ASSET_NAME download URL." >&2
            exit 1
          fi

          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"
          echo "download_url=$download_url" >> "$GITHUB_OUTPUT"

  update-version-info:
    needs: [upload-release-artifact]
    runs-on: ubuntu-24.04
    name: Update version branch
    steps:
      - name: Checkout version branch
        uses: actions/checkout@v6.0.2
        with:
          ref: version

      - name: Checkout updater from main
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/scripts/update_release_versions.py

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.14'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install updater dependency
        run: python -m pip install packaging

      - name: Update release_versions.json
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
          DOWNLOAD_URL: ${{ needs.upload-release-artifact.outputs.download_url }}
          SHA256: ${{ needs.upload-release-artifact.outputs.sha256 }}
        run: |
          set -euo pipefail

          prerelease_arg=()
          if [[ "$IS_PRERELEASE" == 'true' ]]; then
            prerelease_arg+=(--prerelease)
          fi

          python '.github/workflows/scripts/update_release_versions.py' \
            "$RELEASE_TAG" \
            "${prerelease_arg[@]}" \
            --release-url "$RELEASE_URL" \
            --download-url "$DOWNLOAD_URL" \
            --sha256 "$SHA256"

          rm -rf .github

      - name: Commit and push release version data
        run: |
          set -euo pipefail

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          git add release_versions.json
          if git diff --cached --quiet; then
            echo 'release_versions.json is already up to date.'
            exit 0
          fi

          git commit -m "Update release_versions.json for ${{ github.event.release.tag_name }}"
          git push origin version
