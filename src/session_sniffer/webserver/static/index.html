<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Sniffer Mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #181c2a 0%, #23273f 100%);
            color: #e5e9f0;
            min-height: 100vh;
            padding: 14px;
        }

        .container {
            max-width: 1180px;
            margin: 0 auto;
        }

        header {
            background: linear-gradient(90deg, #2e3440, #3b4252);
            border-radius: 16px;
            padding: 18px 20px;
            margin-bottom: 18px;
            border: 1px solid rgba(136, 192, 208, 0.14);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.24);
        }

        h1 {
            font-size: 22px;
            margin-bottom: 10px;
            color: #88c0d0;
            letter-spacing: 0.02em;
        }

        .status-bar {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            font-size: 12px;
        }

        .status-item {
            background: rgba(255, 255, 255, 0.04);
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .status-item label {
            display: block;
            color: #8f9bb3;
            font-size: 10px;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .status-item .value {
            color: #eceff4;
            font-weight: 700;
            line-height: 1.3;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(136, 192, 208, 0.18);
            color: #d8dee9;
            padding: 12px 16px;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 700;
            flex: 1;
            min-width: 140px;
            transition: all 0.18s ease;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        .tab-btn.active {
            background: linear-gradient(180deg, #88c0d0, #81a1c1);
            color: #1e242f;
            border-color: rgba(136, 192, 208, 0.55);
            box-shadow: 0 0 16px rgba(136, 192, 208, 0.18);
        }

        .tab-btn:hover {
            background: rgba(136, 192, 208, 0.15);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .table-wrapper {
            background: rgba(28, 33, 53, 0.96);
            border: 1px solid rgba(136, 192, 208, 0.12);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.22);
        }

        .table-header {
            background: linear-gradient(90deg, rgba(46, 52, 64, 0.92), rgba(59, 66, 82, 0.92));
            padding: 16px 18px;
            font-weight: 700;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .table-count {
            background: #88c0d0;
            color: #1e242f;
            padding: 6px 14px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 0.02em;
        }

        .table-body {
            max-height: 68vh;
            overflow-y: auto;
        }

        .player-card {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0;
            background: rgba(255, 255, 255, 0.01);
            transition: background 0.18s ease, transform 0.18s ease;
        }

        .player-card:hover {
            background: rgba(136, 192, 208, 0.08);
            transform: translateY(-1px);
        }

        .player-card.connected {
            border-left: 4px solid #a3be8c;
        }

        .player-card.disconnected {
            border-left: 4px solid #bf616a;
        }

        .player-summary {
            width: 100%;
            text-align: left;
            border: none;
            background: transparent;
            color: inherit;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-weight: 700;
        }

        .player-summary:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .player-summary-title {
            font-size: 14px;
            color: #eceff4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        .player-summary-ip {
            font-size: 12px;
            color: #8fbcbb;
            white-space: nowrap;
            opacity: 0.9;
        }

        .player-summary-chevron {
            font-size: 18px;
            color: #8f9bb3;
            transition: transform 0.2s ease;
        }

        .player-card.open .player-summary-chevron {
            transform: rotate(180deg);
        }

        .player-details {
            display: none;
            padding: 0 20px 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
        }

        .player-card.open .player-details {
            display: block;
        }

        .player-detail-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            align-items: center;
        }

        .player-detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #8f9bb3;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .detail-value {
            color: #eceff4;
            font-weight: 700;
            font-size: 13px;
            text-align: right;
            word-break: break-word;
        }

        .table-cell {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .cell-label {
            font-size: 10px;
            color: #8f9bb3;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .cell-value {
            color: #eceff4;
            font-weight: 700;
            word-break: break-word;
            line-height: 1.4;
        }

        .cell-value.highlight {
            color: #8fbcbb;
        }

        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: #7c8aa5;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 28px 20px;
            color: #88c0d0;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .error {
            background: rgba(191, 97, 106, 0.12);
            border: 1px solid rgba(191, 97, 106, 0.3);
            color: #eceff4;
            padding: 14px 16px;
            border-radius: 14px;
            margin-bottom: 18px;
            font-size: 13px;
        }

        .footer {
            margin-top: 18px;
            background: linear-gradient(90deg, rgba(46, 52, 64, 0.95), rgba(59, 66, 82, 0.95));
            border: 1px solid rgba(136, 192, 208, 0.12);
            border-radius: 18px;
            padding: 14px 16px;
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .footer-item {
            color: #d8dee9;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .footer-item label {
            color: #8f9bb3;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .footer-item .value {
            font-weight: 700;
            color: #eceff4;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.55; }
            50% { opacity: 1; }
        }

        @media (max-width: 720px) {
            body {
                padding: 12px 8px 18px;
            }

            .status-bar,
            .footer {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-direction: column;
            }

            .table-row {
                grid-template-columns: 1fr;
            }

            .table-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }

        .scrollbar-thin {
            scrollbar-width: thin;
            scrollbar-color: rgba(136, 192, 208, 0.5) transparent;
        }

        .scrollbar-thin::-webkit-scrollbar {
            width: 6px;
        }

        .scrollbar-thin::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.04);
        }

        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: rgba(136, 192, 208, 0.45);
            border-radius: 3px;
        }

        .scrollbar-thin::-webkit-scrollbar-thumb:hover {
            background: rgba(136, 192, 208, 0.65);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="title">Session Sniffer</h1>
            <div class="status-bar">
                <div class="status-item">
                    <label>Capture Status</label>
                    <div class="value" id="statusCapture">Initializing...</div>
                </div>
                <div class="status-item">
                    <label>Config</label>
                    <div class="value" id="statusConfig">Initializing...</div>
                </div>
                <div class="status-item">
                    <label>Issues</label>
                    <div class="value" id="statusIssues">Initializing...</div>
                </div>
                <div class="status-item">
                    <label>Performance</label>
                    <div class="value" id="statusPerformance">Initializing...</div>
                </div>
            </div>
        </header>

        <div id="error" class="error" style="display: none;"></div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(event, 'connected')">
                Connected <span id="connectedCount">0</span>
            </button>
            <button class="tab-btn" onclick="switchTab(event, 'disconnected')">
                Disconnected <span id="disconnectedCount">0</span>
            </button>
        </div>

        <!-- Connected Tab -->
        <div id="connected" class="tab-content active">
            <div class="table-wrapper">
                <div class="table-header">
                    <span>Connected Players</span>
                    <span class="table-count" id="connectedBadge">0</span>
                </div>
                <div class="table-body scrollbar-thin" id="connectedTable">
                    <div class="loading">Waiting for data...</div>
                </div>
            </div>
        </div>

        <!-- Disconnected Tab -->
        <div id="disconnected" class="tab-content">
            <div class="table-wrapper">
                <div class="table-header">
                    <span>Disconnected Players</span>
                    <span class="table-count" id="disconnectedBadge">0</span>
                </div>
                <div class="table-body scrollbar-thin" id="disconnectedTable">
                    <div class="loading">Waiting for data...</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <div class="footer-item">
                <label>Connected</label>
                <div class="value" id="footerConnected">0</div>
            </div>
            <div class="footer-item">
                <label>Disconnected</label>
                <div class="value" id="footerDisconnected">0</div>
            </div>
            <div class="footer-item">
                <label>Capture</label>
                <div class="value" id="footerCapture">Initializing...</div>
            </div>
            <div class="footer-item">
                <label>Performance</label>
                <div class="value" id="footerPerformance">Initializing...</div>
            </div>
        </div>
    </div>

    <script>
        let lastVersion = 0;
        let isConnected = false;

        function switchTab(event, tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            document.getElementById(tab).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            setTimeout(() => {
                errorEl.style.display = 'none';
            }, 5000);
        }

        function updateStatus(data) {
            document.getElementById('title').innerHTML = data.header || 'Session Sniffer';
            document.getElementById('statusCapture').innerHTML = data.status.capture || 'N/A';
            document.getElementById('statusConfig').innerHTML = data.status.config || 'N/A';
            document.getElementById('statusIssues').innerHTML = data.status.issues || 'N/A';
            document.getElementById('statusPerformance').innerHTML = data.status.performance || 'N/A';

            const connectedCount = data.connected.count;
            const disconnectedCount = data.disconnected.count;
            document.getElementById('connectedCount').textContent = connectedCount;
            document.getElementById('disconnectedCount').textContent = disconnectedCount;
            document.getElementById('connectedBadge').textContent = connectedCount;
            document.getElementById('disconnectedBadge').textContent = disconnectedCount;
            document.getElementById('footerConnected').textContent = connectedCount;
            document.getElementById('footerDisconnected').textContent = disconnectedCount;
            document.getElementById('footerCapture').innerHTML = data.status.capture || 'N/A';
            document.getElementById('footerPerformance').innerHTML = data.status.performance || 'N/A';

            renderTable(data.connected, 'connectedTable');
            renderTable(data.disconnected, 'disconnectedTable');
        }

        function renderTable(tableData, elementId) {
            const container = document.getElementById(elementId);

            if (!tableData.rows || tableData.rows.length === 0) {
                container.innerHTML = '<div class="empty-state">No players</div>';
                return;
            }

            const openKeys = new Set(Array.from(container.querySelectorAll('.player-card.open')).map(card => card.dataset.playerKey));
            const columns = tableData.columns || [];
            const rowClass = elementId === 'connectedTable' ? 'connected' : 'disconnected';
            let html = '';

            tableData.rows.forEach((row) => {
                const summary = buildPlayerSummary(columns, row);
                const playerKey = buildPlayerKey(columns, row);
                const isOpen = openKeys.has(playerKey) ? ' open' : '';
                const summaryText = summary.ip && summary.ip !== 'N/A' ? `${summary.title} (${summary.ip})` : summary.title;

                html += `<div class="player-card ${rowClass}${isOpen}" data-player-key="${escapeHtml(playerKey)}">`;
                html += `
                    <button type="button" class="player-summary" onclick="togglePlayerDetails(this)">
                        <span class="player-summary-title">${escapeHtml(summaryText)}</span>
                        <span class="player-summary-chevron">▾</span>
                    </button>
                `;
                html += '<div class="player-details">';

                columns.forEach((col, idx) => {
                    const value = row[idx] ?? 'N/A';
                    html += `
                        <div class="player-detail-row">
                            <span class="detail-label">${escapeHtml(col)}</span>
                            <span class="detail-value">${escapeHtml(value)}</span>
                        </div>
                    `;
                });

                html += '</div>';
                html += '</div>';
            });

            container.innerHTML = html;
        }

        function buildPlayerKey(columns, row) {
            const summary = buildPlayerSummary(columns, row);
            return `${summary.ip || 'unknown'}|${summary.title}`;
        }

        function buildPlayerSummary(columns, row) {
            let title = '';
            let ip = 'N/A';
            const usernameKeys = ['Usernames', 'Username', 'Name'];
            const ipKeys = ['IP Address', 'IP'];

            for (const key of usernameKeys) {
                const idx = columns.indexOf(key);
                if (idx !== -1 && row[idx]) {
                    title = row[idx];
                    break;
                }
            }

            if (!title && columns.length > 0) {
                title = row[0] || 'Player';
            }

            for (const key of ipKeys) {
                const idx = columns.indexOf(key);
                if (idx !== -1 && row[idx]) {
                    ip = row[idx];
                    break;
                }
            }

            if (ip === 'N/A') {
                const ipCandidate = row.find(value => typeof value === 'string' && /^\d+\.\d+\.\d+\.\d+$/.test(value));
                if (ipCandidate) {
                    ip = ipCandidate;
                }
            }

            return {
                title: title || 'Player',
                ip,
            };
        }

        function togglePlayerDetails(button) {
            const card = button.closest('.player-card');
            if (!card) {
                return;
            }
            card.classList.toggle('open');
        }

        function escapeHtml(text) {
            const stringValue = text == null ? '' : String(text);
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return stringValue.replace(/[&<>"']/g, m => map[m]);
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/updates`;

            const ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                isConnected = true;
                console.log('WebSocket connected');
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'keep-alive') {
                        console.log('Keep-alive received');
                        return;
                    }
                    lastVersion = data.version;
                    updateStatus(data);
                } catch (e) {
                    console.error('Error parsing message:', e);
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                showError('Connection error - retrying...');
            };

            ws.onclose = () => {
                isConnected = false;
                console.log('WebSocket disconnected, reconnecting in 3 seconds...');
                setTimeout(connectWebSocket, 3000);
            };
        }

        // Initialize
        window.addEventListener('load', () => {
            connectWebSocket();

            // Fallback: Poll REST API every 5 seconds if WebSocket fails
            setInterval(() => {
                if (!isConnected) {
                    fetch('/api/snapshot')
                        .then(r => {
                            if (!r.ok) throw new Error(`HTTP ${r.status}`);
                            return r.json();
                        })
                        .then(updateStatus)
                        .catch(e => console.error('Poll error:', e));
                }
            }, 5000);
        });
    </script>
</body>
</html>
