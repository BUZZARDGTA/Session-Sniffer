<svg xmlns="http://www.w3.org/2000/svg" viewBox="-6 -4 76 52" role="img" aria-label="Cloud download">
  <defs>
    <filter id="softGlow" x="-40%" y="-50%" width="180%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.20  0 0 0 0 0.58  0 0 0 0 1.00  0 0 0 .55 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="cloudStroke" x1="10" y1="8" x2="52" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b9d9ff"/>
